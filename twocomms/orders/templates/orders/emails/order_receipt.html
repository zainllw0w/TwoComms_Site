{# Body-only HTML (як у management/emails/twocomms_cp_visual.html) — #}
{# темна тема, яку Gmail не інвертує: фон на таблицях через bgcolor, #}
{# без <head>/<style>/<meta>, палітра середньо-темних сірих. #}
{# Preheader (прихований) #}
<div style="display:none;max-height:0;overflow:hidden;opacity:0;color:transparent;line-height:1px;font-size:1px;mso-hide:all;">
  {{ preheader }}
</div>

<table role="presentation" width="100%" cellpadding="0" cellspacing="0" border="0" bgcolor="#121212" style="background:#121212;">
  <tr>
    <td align="center" style="padding:24px 12px;">
      <table role="presentation" width="100%" cellpadding="0" cellspacing="0" border="0" style="width:100%;max-width:600px;">
        <tr>
          <td style="padding:0;">
            <table role="presentation" width="100%" cellpadding="0" cellspacing="0" border="0" bgcolor="#1E1E1E" style="border:1px solid #2A2A2A;border-radius:16px;overflow:hidden;background:#1E1E1E;">

              <!-- Шапка -->
              <tr>
                <td style="padding:22px 22px 18px;">
                  <table role="presentation" width="100%" cellpadding="0" cellspacing="0" border="0">
                    <tr>
                      <td align="left" valign="middle">
                        <table role="presentation" cellpadding="0" cellspacing="0" border="0">
                          <tr>
                            <td valign="middle" style="padding-right:12px;">
                              <img src="{{ logo_url }}" width="44" height="44" alt="TwoComms" style="display:block;border:0;outline:none;border-radius:12px;">
                            </td>
                            <td valign="middle" style="font-family:Arial,Helvetica,sans-serif;color:#E0E0E0;">
                              <div style="font-size:12px;letter-spacing:0.18em;text-transform:uppercase;font-weight:700;color:#BDBDBD;">TwoComms</div>
                              <div style="font-size:18px;font-weight:800;letter-spacing:0.02em;color:#E0E0E0;">Street &amp; Military</div>
                            </td>
                          </tr>
                        </table>
                      </td>
                      <td align="right" valign="middle" style="font-family:Arial,Helvetica,sans-serif;color:#BDBDBD;font-size:12px;">
                        Квитанція
                      </td>
                    </tr>
                  </table>
                </td>
              </tr>

              <!-- Статус оплати -->
              <tr>
                <td style="padding:0 22px 8px;">
                  <table role="presentation" width="100%" cellpadding="0" cellspacing="0" border="0" bgcolor="#121212" style="border:1px solid #2A2A2A;border-radius:16px;background:#121212;">
                    <tr>
                      <td style="padding:18px 18px 16px;border-left:4px solid {{ status.accent }};border-radius:16px;">
                        <div style="font-family:Arial,Helvetica,sans-serif;font-size:19px;line-height:1.3;font-weight:900;color:#FFFFFF;">
                          {{ status.emoji }} {{ status.title }}
                        </div>
                        <div style="margin-top:8px;font-family:Arial,Helvetica,sans-serif;font-size:14px;line-height:1.6;color:#BDBDBD;">
                          {{ status.text }}
                        </div>
                        <div style="margin-top:14px;font-family:Arial,Helvetica,sans-serif;font-size:13px;color:#8A8A8A;">
                          Замовлення
                          <span style="color:{{ status.accent }};font-weight:800;font-size:15px;">№ {{ order_number }}</span>
                        </div>
                      </td>
                    </tr>
                  </table>
                </td>
              </tr>

              <!-- Підсумок оплати -->
              <tr>
                <td style="padding:14px 22px 6px;">
                  <div style="font-family:Arial,Helvetica,sans-serif;color:#BDBDBD;font-size:12px;letter-spacing:0.14em;text-transform:uppercase;font-weight:800;">
                    Оплата
                  </div>
                  <div style="height:10px;line-height:10px;">&nbsp;</div>
                  <table role="presentation" width="100%" cellpadding="0" cellspacing="0" border="0" bgcolor="#121212" style="border:1px solid #2A2A2A;border-radius:16px;background:#121212;">
                    <tr>
                      <td style="padding:16px 18px;font-family:Arial,Helvetica,sans-serif;">
                        <table role="presentation" width="100%" cellpadding="0" cellspacing="0" border="0">
                          <tr>
                            <td style="font-size:13px;color:#BDBDBD;padding:4px 0;">Спосіб оплати</td>
                            <td align="right" style="font-size:13px;color:#E0E0E0;font-weight:700;padding:4px 0;">{{ pay_type_label }}</td>
                          </tr>
                          {% if has_discount %}
                          <tr>
                            <td style="font-size:13px;color:#BDBDBD;padding:4px 0;">
                              Знижка{% if promo_code %} <span style="color:#8A8A8A;">(промокод {{ promo_code }})</span>{% endif %}
                            </td>
                            <td align="right" style="font-size:13px;color:#34D399;font-weight:700;padding:4px 0;">- {{ discount_display }} грн</td>
                          </tr>
                          {% endif %}
                          {% if is_prepaid %}
                          <tr>
                            <td style="font-size:13px;color:#BDBDBD;padding:4px 0;">Внесена передплата</td>
                            <td align="right" style="font-size:14px;color:#A78BFA;font-weight:800;padding:4px 0;">{{ prepayment_display }} грн</td>
                          </tr>
                          <tr>
                            <td style="font-size:13px;color:#BDBDBD;padding:4px 0;">Залишок при отриманні</td>
                            <td align="right" style="font-size:14px;color:#E0E0E0;font-weight:700;padding:4px 0;">{{ remaining_display }} грн</td>
                          </tr>
                          {% endif %}
                          <tr>
                            <td colspan="2" style="padding:8px 0 0;">
                              <div style="border-top:1px solid #2A2A2A;line-height:1px;font-size:1px;">&nbsp;</div>
                            </td>
                          </tr>
                          <tr>
                            <td style="font-size:15px;color:#FFFFFF;font-weight:800;padding:8px 0 0;">Сума замовлення</td>
                            <td align="right" style="font-size:18px;color:#FFFFFF;font-weight:900;padding:8px 0 0;">{{ total_display }} грн</td>
                          </tr>
                        </table>
                      </td>
                    </tr>
                  </table>
                </td>
              </tr>

              <!-- Товари -->
              {% if has_items %}
              <tr>
                <td style="padding:16px 22px 6px;">
                  <div style="font-family:Arial,Helvetica,sans-serif;color:#BDBDBD;font-size:12px;letter-spacing:0.14em;text-transform:uppercase;font-weight:800;">
                    Товари в замовленні
                  </div>
                  <div style="height:10px;line-height:10px;">&nbsp;</div>

                  {% for item in items %}
                  <table role="presentation" width="100%" cellpadding="0" cellspacing="0" border="0" bgcolor="#121212" style="border:1px solid #2A2A2A;border-radius:14px;background:#121212;margin-bottom:10px;">
                    <tr>
                      <td width="76" valign="top" style="padding:12px 0 12px 12px;">
                        {% if item.image_url %}
                        <img src="{{ item.image_url }}" width="64" height="64" alt="{{ item.title }}" style="display:block;width:64px;height:64px;border:0;outline:none;border-radius:10px;object-fit:cover;background:#1E1E1E;">
                        {% else %}
                        <table role="presentation" width="64" height="64" cellpadding="0" cellspacing="0" border="0" bgcolor="#1E1E1E" style="width:64px;height:64px;border-radius:10px;background:#1E1E1E;border:1px solid #2A2A2A;">
                          <tr>
                            <td align="center" valign="middle" style="height:64px;">
                              <img src="{{ logo_url }}" width="32" height="32" alt="TwoComms" style="display:block;border:0;outline:none;">
                            </td>
                          </tr>
                        </table>
                        {% endif %}
                      </td>
                      <td valign="top" style="padding:12px;font-family:Arial,Helvetica,sans-serif;">
                        <div style="font-size:14px;font-weight:800;color:#E0E0E0;line-height:1.35;">{{ item.title }}</div>
                        {% if item.meta %}
                        <div style="margin-top:5px;font-size:12px;color:#9A9AA6;line-height:1.5;">{{ item.meta }}</div>
                        {% endif %}
                        <div style="margin-top:6px;font-size:12px;color:#9A9AA6;">Кількість: <span style="color:#E0E0E0;font-weight:700;">{{ item.qty }}</span></div>
                      </td>
                      <td valign="top" align="right" style="padding:12px 14px 12px 8px;font-family:Arial,Helvetica,sans-serif;white-space:nowrap;">
                        <div style="font-size:15px;font-weight:900;color:#A78BFA;">{{ item.line_total_display }} грн</div>
                      </td>
                    </tr>
                  </table>
                  {% endfor %}

                  {% for lead in custom_leads %}
                  <table role="presentation" width="100%" cellpadding="0" cellspacing="0" border="0" bgcolor="#1a140c" style="border:1px solid #3a2a12;border-radius:14px;background:#1a140c;margin-bottom:10px;">
                    <tr>
                      <td width="76" valign="top" style="padding:12px 0 12px 12px;">
                        <table role="presentation" width="64" height="64" cellpadding="0" cellspacing="0" border="0" bgcolor="#2a1f10" style="width:64px;height:64px;border-radius:10px;background:#2a1f10;">
                          <tr><td align="center" valign="middle" style="height:64px;font-size:26px;">🎨</td></tr>
                        </table>
                      </td>
                      <td valign="top" style="padding:12px;font-family:Arial,Helvetica,sans-serif;">
                        <div style="font-size:14px;font-weight:800;color:#E0E0E0;line-height:1.35;">Кастомний виріб {{ lead.number }}</div>
                        <div style="margin-top:5px;font-size:12px;color:#c7a06a;line-height:1.5;">{% if lead.type %}{{ lead.type }} • {% endif %}Кількість: {{ lead.qty }} • погоджено</div>
                      </td>
                      <td valign="top" align="right" style="padding:12px 14px 12px 8px;font-family:Arial,Helvetica,sans-serif;white-space:nowrap;">
                        <div style="font-size:15px;font-weight:900;color:#f0a542;">{{ lead.price_display }} грн</div>
                      </td>
                    </tr>
                  </table>
                  {% endfor %}
                </td>
              </tr>
              {% endif %}

              <!-- Доставка -->
              <tr>
                <td style="padding:14px 22px 6px;">
                  <div style="font-family:Arial,Helvetica,sans-serif;color:#BDBDBD;font-size:12px;letter-spacing:0.14em;text-transform:uppercase;font-weight:800;">
                    Доставка
                  </div>
                  <div style="height:10px;line-height:10px;">&nbsp;</div>
                  <table role="presentation" width="100%" cellpadding="0" cellspacing="0" border="0" bgcolor="#121212" style="border:1px solid #2A2A2A;border-radius:16px;background:#121212;">
                    <tr>
                      <td style="padding:16px 18px;font-family:Arial,Helvetica,sans-serif;font-size:13px;line-height:1.7;color:#BDBDBD;">
                        <div><span style="color:#8A8A8A;">Отримувач:</span> <span style="color:#E0E0E0;font-weight:700;">{{ full_name }}</span></div>
                        <div><span style="color:#8A8A8A;">Телефон:</span> <span style="color:#E0E0E0;">{{ phone }}</span></div>
                        <div><span style="color:#8A8A8A;">Місто:</span> <span style="color:#E0E0E0;">{{ city }}</span></div>
                        <div><span style="color:#8A8A8A;">Відділення НП:</span> <span style="color:#E0E0E0;">{{ np_office }}</span></div>
                      </td>
                    </tr>
                  </table>
                </td>
              </tr>

              <!-- Instagram-бонус -->
              <tr>
                <td style="padding:18px 22px 6px;">
                  <table role="presentation" width="100%" cellpadding="0" cellspacing="0" border="0" bgcolor="#1a1226" style="border-radius:16px;background:#1a1226;border:1px solid #3a2752;">
                    <tr>
                      <td style="padding:20px 20px 18px;font-family:Arial,Helvetica,sans-serif;">
                        <div style="font-size:16px;font-weight:900;color:#FFFFFF;">🎁 Бонус −10% на наступне замовлення</div>
                        <div style="margin-top:8px;font-size:13px;line-height:1.6;color:#C9BEDD;">
                          Відмітьте <b style="color:#FFFFFF;">@twocomms</b> у сторіс Instagram з <b style="color:#FFFFFF;">відкритого профілю</b> —
                          і ми даруємо знижку <b style="color:#FFFFFF;">10%</b> на наступне замовлення.
                        </div>
                        <div style="margin-top:14px;text-align:center;">
                          <table role="presentation" cellpadding="0" cellspacing="0" border="0" style="margin:0 auto;">
                            <tr>
                              <td bgcolor="#121212" style="border-radius:10px;background:#121212;border:1px dashed #8B5CF6;padding:10px 18px;">
                                <span style="font-family:Arial,Helvetica,sans-serif;font-size:11px;color:#9A9AA6;letter-spacing:0.06em;">ПРОМОКОД</span>
                                <span style="font-family:Arial,Helvetica,sans-serif;font-size:18px;font-weight:900;color:#A78BFA;letter-spacing:0.12em;margin-left:8px;">{{ stories_bonus_promo }}</span>
                              </td>
                            </tr>
                          </table>
                        </div>
                        <div style="margin-top:16px;text-align:center;">
                          <table role="presentation" cellpadding="0" cellspacing="0" border="0" style="margin:0 auto;">
                            <tr>
                              <td bgcolor="#C13584" style="border-radius:12px;background:#C13584;">
                                <a href="{{ instagram_url }}" target="_blank" rel="noopener"
                                   style="display:inline-block;padding:13px 26px;font-family:Arial,Helvetica,sans-serif;font-size:14px;font-weight:800;color:#FFFFFF;text-decoration:none;border-radius:12px;">
                                  📸 Відкрити Instagram
                                </a>
                              </td>
                            </tr>
                          </table>
                        </div>
                      </td>
                    </tr>
                  </table>
                </td>
              </tr>

              <!-- Звʼязок / Telegram -->
              <tr>
                <td style="padding:16px 22px 6px;">
                  <table role="presentation" width="100%" cellpadding="0" cellspacing="0" border="0" bgcolor="#121212" style="border:1px solid #2A2A2A;border-radius:16px;background:#121212;">
                    <tr>
                      <td style="padding:18px 20px;font-family:Arial,Helvetica,sans-serif;">
                        <div style="font-size:14px;font-weight:800;color:#E0E0E0;">Є питання щодо замовлення?</div>
                        <div style="margin-top:6px;font-size:13px;line-height:1.6;color:#BDBDBD;">
                          Напишіть нам у Telegram — відповімо швидко й допоможемо з будь-чим.
                        </div>
                        <div style="margin-top:14px;">
                          <table role="presentation" cellpadding="0" cellspacing="0" border="0">
                            <tr>
                              <td bgcolor="#2AABEE" style="border-radius:12px;background:#2AABEE;">
                                <a href="{{ telegram_url }}" target="_blank" rel="noopener"
                                   style="display:inline-block;padding:12px 22px;font-family:Arial,Helvetica,sans-serif;font-size:14px;font-weight:800;color:#FFFFFF;text-decoration:none;border-radius:12px;">
                                  💬 Написати в Telegram
                                </a>
                              </td>
                              <td width="12" style="font-size:1px;line-height:1px;">&nbsp;</td>
                              <td style="border-radius:12px;border:1px solid #3a3a45;">
                                <a href="{{ my_orders_url }}" target="_blank" rel="noopener"
                                   style="display:inline-block;padding:12px 22px;font-family:Arial,Helvetica,sans-serif;font-size:14px;font-weight:800;color:#E0E0E0;text-decoration:none;border-radius:12px;">
                                  Мої замовлення
                                </a>
                              </td>
                            </tr>
                          </table>
                        </div>
                      </td>
                    </tr>
                  </table>
                </td>
              </tr>

              <!-- Футер -->
              <tr>
                <td style="padding:14px 22px 18px;border-top:1px solid #2A2A2A;font-family:Arial,Helvetica,sans-serif;color:#8A8A8A;font-size:12px;line-height:1.45;">
                  <div style="color:#BDBDBD;font-weight:800;">TwoComms — одяг для свідомих.</div>
                  <div style="margin-top:8px;">
                    <a href="{{ instagram_url }}" target="_blank" rel="noopener" style="color:#A78BFA;text-decoration:underline;">Instagram</a>
                    &nbsp;·&nbsp;
                    <a href="{{ telegram_url }}" target="_blank" rel="noopener" style="color:#A78BFA;text-decoration:underline;">Telegram</a>
                    &nbsp;·&nbsp;
                    <a href="{{ site_url }}" target="_blank" rel="noopener" style="color:#A78BFA;text-decoration:underline;">Сайт</a>
                  </div>
                  <div style="margin-top:10px;color:#6A6A76;">
                    Цей лист сформовано автоматично за вашим замовленням. Якщо ви його не оформлювали — напишіть нам на
                    <a href="mailto:{{ support_email }}" style="color:#8A8A96;text-decoration:underline;">{{ support_email }}</a>.
                  </div>
                </td>
              </tr>

            </table>
          </td>
        </tr>
      </table>
    </td>
  </tr>
</table>
