<div class="ds-modal" id="ds-order-modal" role="dialog" aria-modal="true" aria-labelledby="ds-order-modal-title" hidden>
  <div class="ds-modal__overlay" data-dismiss-modal></div>
  <div class="ds-modal__dialog ds-modal__dialog--wide">
    <header class="ds-modal__header">
      <h2 class="ds-modal__title" id="ds-order-modal-title">Створити замовлення</h2>
      <button type="button" class="ds-modal__close" data-dismiss-modal aria-label="Закрити">
        <i class="fas fa-times" aria-hidden="true"></i>
      </button>
    </header>

    <form id="ds-order-form" class="ds-form" data-np-form="dropship">
      {% csrf_token %}
      <div class="ds-order-form__layout"
           data-np-city-search-url="{% url 'cart_np_city_search' %}"
           data-np-warehouse-search-url="{% url 'cart_np_warehouse_search' %}">
        <div class="ds-order-form__section">
          <h3 class="ds-order-form__section-title">Дані клієнта</h3>
          <div class="ds-form__grid">
            <label class="ds-input ds-input--full">
              <span class="ds-input__label">ПІБ клієнта (прізвище, ім'я, по батькові)</span>
              <input type="text" name="client_name" required autocomplete="name" placeholder="Введіть повне ПІБ клієнта">
            </label>
            <label class="ds-input">
              <span class="ds-input__label">Телефон клієнта</span>
              <input type="tel" name="client_phone" required autocomplete="tel" inputmode="tel" placeholder="0931234567" data-uk-phone-field>
              <small class="ds-input__hint">Префікс +380 підставимо автоматично.</small>
            </label>
            <label class="ds-input">
              <span class="ds-input__label">Місто (Нова Пошта)</span>
              <div class="np-selector" data-np-city-selector>
                <input type="text" name="client_city" required placeholder="Почніть вводити місто Нової пошти" autocomplete="off" spellcheck="false" data-np-city-input aria-autocomplete="list" aria-expanded="false">
                <input type="hidden" name="client_np_settlement_ref" data-np-settlement-ref>
                <input type="hidden" name="client_np_city_ref" data-np-city-ref>
                <input type="hidden" name="client_np_city_token" data-np-city-token>
                <div class="np-selector-results" data-np-city-results hidden></div>
              </div>
              <small class="ds-input__hint np-selector-status" data-np-city-status>Почніть вводити назву міста і виберіть підтверджений варіант зі списку Нової пошти.</small>
            </label>
            <label class="ds-input ds-input--full">
              <span class="ds-input__label">Відділення Нової Пошти</span>
              <div class="np-selector" data-np-warehouse-selector>
                <input type="text" name="client_np_office" required placeholder="Оберіть відділення або поштомат" autocomplete="off" spellcheck="false" data-np-warehouse-input aria-autocomplete="list" aria-expanded="false">
                <input type="hidden" name="client_np_warehouse_ref" data-np-warehouse-ref>
                <input type="hidden" name="client_np_warehouse_token" data-np-warehouse-token>
                <div class="np-selector-results" data-np-warehouse-results hidden></div>
              </div>
              <div class="np-selector-kind" data-np-kind-toggle>
                <button type="button" class="np-selector-kind-btn is-active" data-kind="all">Усі пункти</button>
                <button type="button" class="np-selector-kind-btn" data-kind="branch">Відділення</button>
                <button type="button" class="np-selector-kind-btn" data-kind="postomat">Поштомат</button>
              </div>
              <small class="ds-input__hint np-selector-status" data-np-warehouse-status>Після вибору міста почніть вводити номер або адресу і виберіть відділення чи поштомат зі списку Нової пошти.</small>
            </label>
            <label class="ds-input ds-input--full">
              <span class="ds-input__label">Джерело замовлення (необов'язково)</span>
              <input type="text" name="order_source" placeholder="Посилання на сторінку або джерело">
            </label>
            <label class="ds-input ds-input--full">
              <span class="ds-input__label">Примітки до замовлення</span>
              <textarea name="notes" rows="3" placeholder="Коментарі, побажання клієнта, додаткові деталі"></textarea>
            </label>
          </div>
        </div>

        <div class="ds-order-form__section">
          <div class="ds-order-form__section-header">
            <h3 class="ds-order-form__section-title">Товари у замовленні</h3>
            <button type="button" class="ds-btn ds-btn--primary ds-btn--sm js-open-product-modal">
              <i class="fas fa-plus" aria-hidden="true"></i>
              <span>Додати товар</span>
            </button>
          </div>
          
          <div id="ds-order-items" class="ds-order-items" data-empty-text="Поки що немає товарів. Натисніть 'Додати товар' щоб почати формування замовлення."></div>
        </div>
      </div>

      <footer class="ds-modal__footer">
        <button type="button" class="ds-btn ds-btn--ghost" data-dismiss-modal>Скасувати</button>
        <button type="submit" class="ds-btn ds-btn--primary">
          <i class="fas fa-check" aria-hidden="true"></i>
          <span>Створити замовлення</span>
        </button>
      </footer>
    </form>
  </div>
</div>

<div class="ds-modal" id="ds-product-modal" role="dialog" aria-modal="true" aria-labelledby="ds-product-modal-title" hidden>
  <div class="ds-modal__overlay" data-dismiss-modal></div>
  <div class="ds-modal__dialog ds-modal__dialog--wide">
    <header class="ds-modal__header">
      <h2 class="ds-modal__title" id="ds-product-modal-title">Додати товар</h2>
      <button type="button" class="ds-modal__close" data-dismiss-modal aria-label="Закрити">
        <i class="fas fa-times" aria-hidden="true"></i>
      </button>
    </header>

    <div class="ds-product-modal">
      <form id="ds-product-search" class="ds-form ds-form--inline" role="search">
        <label class="ds-input ds-input--search">
          <span class="sr-only">Пошук товарів</span>
          <i class="fas fa-search" aria-hidden="true"></i>
          <input type="search" name="search" placeholder="Шукати по назві чи опису…" autocomplete="off">
        </label>
      </form>

      <div id="ds-product-results" class="ds-product-results" data-empty-text="Введіть пошуковий запит, щоб побачити товари."></div>
    </div>
  </div>
</div>

{% with methods=payout_methods|default:payment_method_choices %}
<div class="ds-modal" id="ds-payout-modal" role="dialog" aria-modal="true" aria-labelledby="ds-payout-modal-title" hidden>
  <div class="ds-modal__overlay" data-dismiss-modal></div>
  <div class="ds-modal__dialog">
    <header class="ds-modal__header">
      <h2 class="ds-modal__title" id="ds-payout-modal-title">Запит на виплату</h2>
      <button type="button" class="ds-modal__close" data-dismiss-modal aria-label="Закрити">
        <i class="fas fa-times" aria-hidden="true"></i>
      </button>
    </header>

    <form id="ds-payout-form" class="ds-form">
      {% csrf_token %}
      <div class="ds-form__grid">
        <label class="ds-input">
          <span class="ds-input__label">Спосіб виплати</span>
          <select name="payment_method" id="ds-payout-method" required>
            <option value="card">На картку</option>
            <option value="iban">IBAN</option>
          </select>
        </label>
        <label class="ds-input ds-input--full">
          <span class="ds-input__label" id="ds-payout-details-label">Номер картки</span>
          <input type="text" name="payment_details" id="ds-payout-details" required placeholder="1234 5678 9012 3456">
          <small class="ds-input__hint" id="ds-payout-hint" style="display: block; margin-top: 6px; font-size: 0.85rem; color: rgba(229,231,235,.6); line-height: 1.4;">16 цифр картки без пробілів або з пробілами</small>
        </label>
        <label class="ds-input ds-input--full">
          <span class="ds-input__label">Примітки для менеджера (необов'язково)</span>
          <textarea name="notes" rows="3" placeholder="Додаткові побажання чи коментарі"></textarea>
        </label>
      </div>

      <footer class="ds-modal__footer">
        <button type="button" class="ds-btn ds-btn--ghost" data-dismiss-modal>Скасувати</button>
        <button type="submit" class="ds-btn ds-btn--primary" id="ds-payout-submit">
          <i class="fas fa-paper-plane" aria-hidden="true"></i>
          <span>Надіслати запит</span>
        </button>
      </footer>
    </form>
  </div>
</div>
{% endwith %}
