{% load i18n %}
{% load i18n_links %}
{% language_switch_links as footer_langs %}
<div class="footer-langs-wrap container-xxl">
  <div class="footer-langs" aria-label="{% trans 'Мова сайту' %}">
    <span class="footer-langs__label">{% trans 'Мова' %}</span>
    <div class="footer-langs__group" role="group">
      {% for item in footer_langs %}
        <form class="footer-langs__form"
              method="post"
              action="{% url 'set_language' %}">
          {% csrf_token %}
          <input type="hidden" name="language" value="{{ item.code }}">
          <input type="hidden" name="next" value="{{ item.url }}">
          <a class="footer-langs__link{% if item.is_current %} is-active{% endif %}"
             href="{{ item.url }}"
             hreflang="{{ item.code }}"
             lang="{{ item.code }}"
             rel="alternate"
             data-lang-code="{{ item.code }}"
             {% if item.is_current %}aria-current="true"{% endif %}>
            <span class="footer-langs__flag" aria-hidden="true">
              {% if item.flag_image_url %}
                <img class="footer-langs__flag-img"
                     src="{{ item.flag_image_url }}"
                     alt=""
                     width="20"
                     height="20"
                     loading="lazy"
                     decoding="async">
              {% else %}
                {{ item.flag }}
              {% endif %}
            </span>
            <span class="footer-langs__name">{{ item.label }}</span>
            <span class="footer-langs__short" aria-hidden="true">{{ item.short }}</span>
          </a>
        </form>
      {% endfor %}
    </div>
  </div>
</div>

<script>
  (function () {
    var links = document.querySelectorAll('.footer-langs__link');
    for (var i = 0; i < links.length; i++) {
      links[i].addEventListener('click', function (e) {
        var form = this.closest('form');
        if (!form) return;
        e.preventDefault();
        form.submit();
      });
    }
  })();
</script>
