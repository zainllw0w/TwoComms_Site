{# Модалка погашення боргу магазину #}
<div class="fin-modal-overlay" id="cons-payment-modal" hidden>
    <div class="fin-modal-card">
        <div class="fin-modal-head">
            <h3>Погасити борг</h3>
            <button type="button" class="fin-modal-close" data-cons-close>×</button>
        </div>
        <form id="cons-payment-form" class="fin-modal-body">
            <div class="fin-field">
                <span>Спосіб погашення</span>
                <div class="fin-radio-row">
                    <label><input type="radio" name="mode" value="manual_cash" checked> Готівка (вручну)</label>
                    <label><input type="radio" name="mode" value="pick_txn"> Обрати транзакцію</label>
                </div>
            </div>

            <!-- Готівка -->
            <div id="cons-pay-cash" class="fin-pay-group">
                <label class="fin-field">
                    <span>Рахунок зарахування *</span>
                    <select name="account_id" id="cons-pay-account" class="fin-select"></select>
                </label>
            </div>

            <!-- Обрати транзакцію -->
            <div id="cons-pay-txn" class="fin-pay-group" hidden>
                <label class="fin-field">
                    <span>Транзакція (фактичний дохід)</span>
                    <select name="txn_id" id="cons-pay-txn-select" class="fin-select"></select>
                </label>
                <label class="fin-field" id="cons-link-cp-wrap" hidden>
                    <label class="fin-check-inline">
                        <input type="checkbox" name="link_account_cp" id="cons-link-cp">
                        Привʼязати цей рахунок до контрагента магазину (для авто-розпізнавання надалі)
                    </label>
                </label>
            </div>

            <div class="fin-field-row">
                <label class="fin-field">
                    <span>Сума (₴) *</span>
                    <input type="number" step="0.01" name="amount" id="cons-pay-amount" class="fin-input" required>
                </label>
                <label class="fin-field">
                    <span>Дата</span>
                    <input type="date" name="date" id="cons-pay-date" class="fin-input">
                </label>
            </div>

            <label class="fin-field">
                <span>Коментар</span>
                <input type="text" name="comment" id="cons-pay-comment" class="fin-input">
            </label>

            <div class="fin-modal-foot">
                <button type="button" class="fin-btn fin-btn--ghost" data-cons-close>Скасувати</button>
                <button type="submit" class="fin-btn fin-btn--primary">Зафіксувати виплату</button>
            </div>
        </form>
    </div>
</div>
