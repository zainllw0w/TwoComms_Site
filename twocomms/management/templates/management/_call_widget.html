<style>
.mgmt-call-dock{margin-top:10px;}
.mgmt-call-btn{display:inline-flex;align-items:center;gap:8px;background:linear-gradient(135deg,#1f7a44,#23994f);color:#eafff1;border:1px solid #2fae5e;border-radius:11px;padding:9px 16px;font-size:13px;font-weight:700;cursor:pointer;font-family:inherit;letter-spacing:.01em;box-shadow:0 2px 10px rgba(34,197,94,.18);transition:transform .12s ease,box-shadow .15s,filter .15s;}
.mgmt-call-btn:hover{filter:brightness(1.07);transform:translateY(-1px);box-shadow:0 4px 16px rgba(34,197,94,.28);}
.mgmt-call-btn:active{transform:translateY(0);}
.mgmt-call-btn[disabled]{opacity:.5;cursor:not-allowed;filter:grayscale(.4);box-shadow:none;}
.mgmt-call-btn svg{width:16px;height:16px;}
.mgmt-call-btn.is-redial{background:linear-gradient(135deg,#1f5f7a,#2484a8);border-color:#2f9fc7;box-shadow:0 2px 10px rgba(59,130,246,.18);}
.mgmt-call-hint{margin-top:7px;font-size:11.5px;color:#9aa6b6;display:flex;align-items:center;gap:6px;}
.mgmt-call-hint svg{width:13px;height:13px;flex-shrink:0;opacity:.8;}

/* Жива картка дзвінка */
.mgmt-call-live{margin-top:11px;border:1px solid #243042;border-radius:14px;padding:13px 15px;background:linear-gradient(180deg,#101622,#0c111a);display:flex;align-items:center;gap:14px;flex-wrap:wrap;animation:mgmtCallIn .26s cubic-bezier(.2,.7,.3,1);position:relative;overflow:hidden;}
@keyframes mgmtCallIn{from{opacity:0;transform:translateY(6px) scale(.99);}to{opacity:1;transform:none;}}
.mgmt-call-live::before{content:"";position:absolute;inset:0;background:radial-gradient(120px 60px at 16px 50%,rgba(245,158,11,.10),transparent 70%);pointer-events:none;transition:background .4s;}
.mgmt-call-live.is-talking::before{background:radial-gradient(140px 70px at 16px 50%,rgba(34,197,94,.14),transparent 70%);}
.mgmt-call-live.is-ended::before{background:none;}

/* Пульсуюча іконка-телефон з хвилями */
.mgmt-call-orb{position:relative;width:38px;height:38px;flex-shrink:0;display:grid;place-items:center;border-radius:50%;background:rgba(245,158,11,.14);color:#fcd34d;}
.mgmt-call-orb svg{width:18px;height:18px;position:relative;z-index:2;}
.mgmt-call-orb::after,.mgmt-call-orb::before{content:"";position:absolute;inset:0;border-radius:50%;border:2px solid rgba(245,158,11,.45);animation:mgmtRing 1.8s ease-out infinite;}
.mgmt-call-orb::before{animation-delay:.9s;}
@keyframes mgmtRing{0%{transform:scale(.7);opacity:.7;}100%{transform:scale(1.7);opacity:0;}}
.mgmt-call-live.is-talking .mgmt-call-orb{background:rgba(34,197,94,.16);color:#86efac;}
.mgmt-call-live.is-talking .mgmt-call-orb::after,.mgmt-call-live.is-talking .mgmt-call-orb::before{border-color:rgba(34,197,94,.5);}
.mgmt-call-live.is-ended .mgmt-call-orb{background:rgba(120,130,150,.14);color:#9fb0c4;}
.mgmt-call-live.is-ended .mgmt-call-orb::after,.mgmt-call-live.is-ended .mgmt-call-orb::before{display:none;}

.mgmt-call-live__main{display:flex;flex-direction:column;gap:3px;flex:1;min-width:140px;}
.mgmt-call-live__status{font-size:13px;color:#e7ecf3;font-weight:700;line-height:1.25;}
.mgmt-call-live__sub{font-size:11.5px;color:#8b97a8;line-height:1.35;}
.mgmt-call-live__timer{font-variant-numeric:tabular-nums;font-size:20px;font-weight:800;color:#e7ecf3;letter-spacing:.02em;}
.mgmt-call-live.is-talking .mgmt-call-live__timer{color:#86efac;}
.mgmt-call-live__hangup{background:#ef4444;color:#fff;border:none;border-radius:10px;padding:8px 14px;font-size:12.5px;font-weight:700;cursor:pointer;font-family:inherit;display:inline-flex;align-items:center;gap:6px;transition:filter .15s,transform .12s;}
.mgmt-call-live__hangup:hover{filter:brightness(1.08);transform:translateY(-1px);}
.mgmt-call-live__hangup svg{width:14px;height:14px;}
.mgmt-call-live.is-ended .mgmt-call-live__hangup{display:none;}

.mgmt-call-msg{margin-top:8px;font-size:12px;padding:8px 11px;border-radius:9px;display:none;line-height:1.4;}
.mgmt-call-msg.show{display:block;}
.mgmt-call-msg.err{background:rgba(239,68,68,.1);color:#fca5a5;border:1px solid rgba(239,68,68,.25);}
.mgmt-call-msg.ok{background:rgba(34,197,94,.1);color:#86efac;border:1px solid rgba(34,197,94,.22);}
.mgmt-call-msg.info{background:rgba(59,130,246,.1);color:#93c5fd;border:1px solid rgba(59,130,246,.22);}

/* Записи розмов на картці клієнта */
.mgmt-client-calls{display:flex;flex-direction:column;gap:8px;}
.mgmt-calls-empty{font-size:12.5px;color:#8b97a8;padding:6px 2px;}
.mgmt-call-row{border:1px solid #243042;border-radius:11px;padding:10px 12px;background:#0e131c;display:flex;flex-direction:column;gap:8px;}
.mgmt-call-row__top{display:flex;align-items:center;gap:10px;flex-wrap:wrap;font-size:12.5px;color:#cdd6e3;}
.mgmt-call-row__dir{width:26px;height:26px;border-radius:8px;display:grid;place-items:center;flex-shrink:0;font-size:13px;}
.mgmt-call-row__dir.out{background:rgba(59,130,246,.14);color:#93c5fd;}
.mgmt-call-row__dir.in{background:rgba(34,197,94,.14);color:#86efac;}
.mgmt-call-row__dur{margin-left:auto;font-variant-numeric:tabular-nums;font-weight:700;color:#e7ecf3;}
.mgmt-call-row__ai{font-size:11px;padding:2px 8px;border-radius:999px;background:#1b2230;color:#9fb0c4;}
.mgmt-call-row__ai.pending{background:rgba(245,158,11,.14);color:#fcd34d;}
.mgmt-call-row__ai.done{background:rgba(34,197,94,.14);color:#86efac;}
.mgmt-call-row audio{width:100%;height:34px;}
</style>
<script>
(function(){
  "use strict";
  var ep = document.getElementById('home-endpoints');
  if(!ep) return;
  var URLS = {
    start: ep.dataset.callStartUrl, status: ep.dataset.callStatusUrl,
    hangup: ep.dataset.callHangupUrl, can: ep.dataset.callCanUrl,
    clientCalls: ep.dataset.callClientCallsUrl
  };
  if(!URLS.start) return;

  function cookie(name){
    var v=null;
    if(document.cookie){ document.cookie.split(';').forEach(function(c){ c=c.trim(); if(c.substring(0,name.length+1)===name+'='){ v=decodeURIComponent(c.substring(name.length+1)); } }); }
    return v;
  }
  var CSRF = cookie('csrftoken');
  function api(url, body){
    return fetch(url, {method:'POST', headers:{'Content-Type':'application/json','X-CSRFToken':CSRF,'X-Requested-With':'XMLHttpRequest'}, body:JSON.stringify(body||{})})
      .then(function(r){ return r.json().catch(function(){ return {success:false, error:'Помилка відповіді.'}; }); });
  }
  function fmt(sec){ sec=parseInt(sec||0,10); var m=Math.floor(sec/60), s=sec%60; return m+':'+(s<10?'0':'')+s; }

  var PHONE_SVG = '<svg viewBox="0 0 24 24" fill="currentColor"><path d="M6.6 10.8a15.6 15.6 0 0 0 6.6 6.6l2.2-2.2a1 1 0 0 1 1-.25 11.4 11.4 0 0 0 3.6.58 1 1 0 0 1 1 1V20a1 1 0 0 1-1 1A17 17 0 0 1 3 4a1 1 0 0 1 1-1h3.5a1 1 0 0 1 1 1 11.4 11.4 0 0 0 .58 3.6 1 1 0 0 1-.25 1l-2.23 2.2z"/></svg>';
  var HANGUP_SVG = '<svg viewBox="0 0 24 24" fill="currentColor"><path d="M12 9c-1.6 0-3.15.25-4.6.7v3.1c0 .4-.23.74-.57.9-.98.49-1.87 1.1-2.66 1.85a1 1 0 0 1-1.4-.02L.3 13.05a1 1 0 0 1 0-1.4C3.34 8.77 7.46 7 12 7s8.66 1.77 11.7 4.65a1 1 0 0 1 0 1.4l-2.47 2.38a1 1 0 0 1-1.4.02 12.2 12.2 0 0 0-2.66-1.84.99.99 0 0 1-.57-.9V9.7C15.15 9.25 13.6 9 12 9z"/></svg>';

  var ACTIVE_STATES = {dialing:1, ringing:1, talking:1};
  window.__mgmtActiveCalls = window.__mgmtActiveCalls || {};

  var canCall = false;
  function val(id){ var el=id?document.getElementById(id):null; return el?el.value.trim():''; }
  function setVal(id, v){ var el=id?document.getElementById(id):null; if(el) el.value=v; }

  // Дружні підсумки завершення (без телефонного жаргону/провайдера).
  function endLabel(disposition){
    var d = (disposition||'').toUpperCase();
    if(d==='ANSWER'||d==='SUCCESS'||d==='TRANSFER') return {t:'Розмову завершено', s:'Дякуємо! Запис з\'явиться за кілька хвилин.', tone:'ok'};
    if(d==='VM-SUCCESS') return {t:'Залишено голосове', s:'Клієнт не підняв — спрацювала голосова пошта.', tone:'info'};
    if(d==='VM') return {t:'Голосова пошта', s:'Клієнт не відповів. Варто передзвонити пізніше.', tone:'info'};
    if(d==='NOANSWER') return {t:'Клієнт не відповів', s:'Спробуйте передзвонити трохи згодом.', tone:'info'};
    if(d==='BUSY') return {t:'Зайнято', s:'Лінія клієнта зайнята — спробуйте ще раз.', tone:'info'};
    if(d==='CANCEL') return {t:'Дзвінок скасовано', s:'З\'єднання перервано до відповіді.', tone:'info'};
    if(d==='CHANUNAVAIL'||d==='CONGESTION') return {t:'Номер недоступний', s:'Не вдалося додзвонитися. Перевірте номер.', tone:'info'};
    return {t:'Дзвінок завершено', s:'Запис з\'явиться за кілька хвилин.', tone:'ok'};
  }

  function renderDock(dock, opts){
    opts = opts || {};
    var redial = opts.redial;
    dock.innerHTML =
      '<button type="button" class="mgmt-call-btn'+(redial?' is-redial':'')+'" data-call-go>'+PHONE_SVG
      +(redial?'Подзвонити ще раз':'Подзвонити')+'</button>'
      +'<div class="mgmt-call-hint" data-call-hint hidden></div>'
      +'<div class="mgmt-call-live" data-call-live hidden>'
        +'<span class="mgmt-call-orb">'+PHONE_SVG+'</span>'
        +'<div class="mgmt-call-live__main">'
          +'<span class="mgmt-call-live__status" data-call-status-text>Готуємо дзвінок…</span>'
          +'<span class="mgmt-call-live__sub" data-call-status-sub></span>'
        +'</div>'
        +'<span class="mgmt-call-live__timer" data-call-timer>0:00</span>'
        +'<button type="button" class="mgmt-call-live__hangup" data-call-hangup>'+HANGUP_SVG+'Завершити</button>'
      +'</div>'
      +'<div class="mgmt-call-msg" data-call-msg></div>';
    var btn = dock.querySelector('[data-call-go]');
    var hint = dock.querySelector('[data-call-hint]');
    if(!canCall){
      btn.disabled = true;
      btn.title = 'Лінію не призначено';
      hint.hidden = false;
      hint.innerHTML = '<svg viewBox="0 0 24 24" fill="currentColor"><path d="M12 2a10 10 0 1 0 0 20 10 10 0 0 0 0-20zm1 15h-2v-2h2v2zm0-4h-2V7h2v6z"/></svg>Дзвінки вимкнено — зверніться до адміністратора, щоб активував вашу лінію.';
    } else {
      hint.hidden = false;
      hint.innerHTML = '<svg viewBox="0 0 24 24" fill="currentColor"><path d="M12 2a10 10 0 1 0 0 20 10 10 0 0 0 0-20zm1 15h-2v-2h2v2zm0-4h-2V7h2v6z"/></svg>Натисніть — спершу дзвінок надійде вам, підійміть слухавку, і ми з\'єднаємо з клієнтом. Дані можна заповнювати під час розмови.';
    }
  }

  function msg(dock, text, kind){
    var m = dock.querySelector('[data-call-msg]'); if(!m) return;
    m.textContent = text || ''; m.className = 'mgmt-call-msg' + (text?(' show '+(kind||'ok')):'');
  }

  function formKey(dock){
    var f = dock.closest('form'); return f ? (f.id || 'form') : 'noform';
  }

  function resetDock(dock){
    var rec = window.__mgmtActiveCalls[formKey(dock)];
    if(rec && rec.sessionId && !rec.ended) return; // активний дзвінок не чіпаємо
    delete window.__mgmtActiveCalls[formKey(dock)];
    setVal(dock.dataset.sessionField, '');
    renderDock(dock);
  }

  function startCall(dock){
    var phone = val(dock.dataset.phoneField);
    if(!phone){ msg(dock, 'Спершу введіть номер телефону клієнта.', 'err'); return; }
    var body = {phone:phone};
    var cid = val(dock.dataset.clientField); if(cid) body.client_id = cid;
    var lid = val(dock.dataset.leadField); if(lid) body.lead_id = lid;
    var btn = dock.querySelector('[data-call-go]');
    btn.disabled = true; msg(dock, '');
    api(URLS.start, body).then(function(d){
      if(!d.success){ btn.disabled=false; msg(dock, d.error||'Не вдалося подзвонити.', 'err'); return; }
      var s = d.session;
      setVal(dock.dataset.sessionField, s.session_id);
      window.__mgmtActiveCalls[formKey(dock)] = {sessionId:s.session_id, ended:false};
      runLive(dock, s);
    }).catch(function(){ btn.disabled=false; msg(dock, 'Помилка запиту. Спробуйте ще раз.', 'err'); });
  }

  function runLive(dock, session){
    var live = dock.querySelector('[data-call-live]');
    var statusText = dock.querySelector('[data-call-status-text]');
    var subText = dock.querySelector('[data-call-status-sub]');
    var timerEl = dock.querySelector('[data-call-timer]');
    var btn = dock.querySelector('[data-call-go]');
    live.hidden = false; btn.style.display='none'; msg(dock, '');
    statusText.textContent = 'Підійміть слухавку 📲';
    subText.textContent = 'Зараз вам надійде вхідний дзвінок. Після відповіді з\'єднаємо з клієнтом.';
    var startedTs = Date.now();
    var sessionId = session.session_id;
    var ended = false;
    var wasTalking = false;

    var tick = setInterval(function(){
      if(!ended) timerEl.textContent = fmt(Math.floor((Date.now()-startedTs)/1000));
    }, 500);

    function applyState(s){
      if(s.status==='talking'){
        live.classList.add('is-talking');
        if(!wasTalking){ wasTalking = true; }
        statusText.textContent = 'Розмова з клієнтом';
        subText.textContent = 'Йде запис. Можете заповнювати картку прямо зараз.';
      } else if(s.status==='ended' || s.status==='failed'){
        live.classList.remove('is-talking'); live.classList.add('is-ended');
        var rec = window.__mgmtActiveCalls[formKey(dock)];
        ended = true; if(rec){ rec.ended = true; }
        clearInterval(tick); clearInterval(poll); clearTimeout(safety);
        if(s.duration_seconds){ timerEl.textContent = fmt(s.duration_seconds); }
        if(s.status==='failed'){
          statusText.textContent = 'Не вдалося з\'єднати';
          subText.textContent = 'Перевірте, чи ваша лінія в мережі, і спробуйте ще раз.';
          msg(dock, '');
        } else {
          var info = endLabel(s.disposition);
          statusText.textContent = info.t;
          subText.textContent = info.s;
        }
        // показати кнопку «подзвонити ще раз»
        renderRedial(dock);
      }
    }

    var poll = setInterval(function(){
      api(URLS.status, {session_id:sessionId}).then(function(d){ if(d.success) applyState(d.session); });
    }, 3500);

    // Запобіжник: якщо за 12 хв статус не фіналізувався (вкладка висить) —
    // зупиняємо опитування й мʼяко позначаємо завершення.
    var safety = setTimeout(function(){
      if(!ended){
        clearInterval(poll); clearInterval(tick);
        var rec = window.__mgmtActiveCalls[formKey(dock)];
        if(rec){ rec.ended = true; }
        live.classList.remove('is-talking'); live.classList.add('is-ended');
        statusText.textContent = 'Дзвінок завершено';
        subText.textContent = 'Запис зʼявиться згодом, якщо розмова відбулася.';
        renderRedial(dock);
      }
    }, 12 * 60 * 1000);

    var hangupBtn = dock.querySelector('[data-call-hangup]');
    hangupBtn.onclick = function(){
      hangupBtn.disabled = true;
      api(URLS.hangup, {session_id:sessionId}).then(function(d){ if(d.success) applyState(d.session); });
    };
  }

  // Після завершення — показуємо кнопку повтору («подзвонити ще раз»).
  function renderRedial(dock){
    var btn = dock.querySelector('[data-call-go]');
    if(btn){
      btn.style.display='';
      btn.disabled = !canCall;
      btn.classList.add('is-redial');
      btn.innerHTML = PHONE_SVG + 'Подзвонити ще раз';
    }
  }

  // Лінива підвантаження записів розмов у модалку клієнта (тільки при редагуванні).
  function loadClientCalls(){
    var section = document.getElementById('client-calls-section');
    var box = document.getElementById('client-calls-box');
    if(!section || !box || !URLS.clientCalls) return;
    var cid = val('client_id');
    if(!cid){ section.hidden = true; box.innerHTML = ''; return; }
    section.hidden = false;
    box.innerHTML = '<div class="mgmt-calls-empty">Завантаження…</div>';
    fetch(URLS.clientCalls + '?client_id=' + encodeURIComponent(cid), {headers:{'X-Requested-With':'XMLHttpRequest'}})
      .then(function(r){ return r.json(); })
      .then(function(d){
        if(!d || !d.success){ section.hidden = true; return; }
        var calls = d.calls || [];
        if(!calls.length){ box.innerHTML = '<div class="mgmt-calls-empty">Записів розмов поки немає. Зателефонуйте клієнту — запис з\'явиться тут.</div>'; return; }
        box.innerHTML = calls.map(function(c){ return renderCallRow(c, d.is_admin); }).join('');
      })
      .catch(function(){ section.hidden = true; });
  }

  function aiBadge(c){
    if(c.ai_status==='done') return '<span class="mgmt-call-row__ai done">ШІ ✓</span>';
    if(c.ai_status==='pending'||c.ai_status==='running') return '<span class="mgmt-call-row__ai pending">ШІ аналізує…</span>';
    return '';
  }
  function esc2(s){ return String(s==null?'':s).replace(/[&<>"]/g,function(ch){return {'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;'}[ch];}); }
  function renderCallRow(c, isAdmin){
    var dir = c.direction==='inbound' ? '<span class="mgmt-call-row__dir in" title="Вхідний">↙</span>' : '<span class="mgmt-call-row__dir out" title="Вихідний">↗</span>';
    var dur = fmt(c.duration);
    var aiInfo = '';
    if(isAdmin && c.ai){ aiInfo = '<div class="mgmt-call-live__sub" style="margin-top:2px;">Оцінка ШІ: <b>'+Math.round(c.ai.overall_score)+'</b>/100 · '+esc2(c.ai.verdict)+(c.ai.summary?(' — '+esc2(c.ai.summary).slice(0,160)):'')+'</div>'; }
    var player = c.has_recording
      ? '<audio controls preload="none" src="'+esc2(c.recording_url)+'"></audio>'
      : '<div class="mgmt-calls-empty" style="padding:0;">Запис недоступний для цього дзвінка.</div>';
    return '<div class="mgmt-call-row">'
      +'<div class="mgmt-call-row__top">'+dir+'<span>'+esc2(c.started_at||'—')+'</span>'
      +(c.manager?('<span style="color:#8b97a8;">· '+esc2(c.manager)+'</span>'):'')
      +aiBadge(c)+'<span class="mgmt-call-row__dur">'+dur+'</span></div>'
      +player+aiInfo+'</div>';
  }

  function guardForm(form){
    if(!form || form.__mgmtCallGuard) return;
    form.addEventListener('submit', function(e){
      var rec = window.__mgmtActiveCalls[form.id || 'form'];
      if(rec && rec.sessionId && !rec.ended){
        var ok = window.confirm('Дзвінок ще триває. Зберегти зараз? Натисніть «Скасувати», щоб продовжити розмову, або «ОК», щоб зберегти примусово.');
        if(!ok){ e.preventDefault(); e.stopImmediatePropagation(); return false; }
      }
    }, true);
  }

  function init(){
    var docks = document.querySelectorAll('[data-call-dock]');
    if(!docks.length) return;
    docks.forEach(function(dock){ renderDock(dock); guardForm(dock.closest('form')); });
    document.addEventListener('click', function(e){
      var go = e.target.closest('[data-call-go]');
      if(go){ var dock = go.closest('[data-call-dock]'); if(dock) startCall(dock); }
      if(e.target.closest('.open-add-client, .process-lead, .edit-client, .phase-jump-client')){
        setTimeout(function(){ docks.forEach(resetDock); loadClientCalls(); }, 80);
      }
    });
    if(URLS.can){
      fetch(URLS.can, {headers:{'X-Requested-With':'XMLHttpRequest'}}).then(function(r){return r.json();}).then(function(d){
        canCall = !!(d && d.can_call);
        docks.forEach(function(dock){
          var rec = window.__mgmtActiveCalls[formKey(dock)];
          if(rec && rec.sessionId && !rec.ended) return;
          renderDock(dock);
        });
      }).catch(function(){});
    }
  }

  if(document.readyState==='loading'){ document.addEventListener('DOMContentLoaded', init); }
  else { init(); }
})();
</script>
