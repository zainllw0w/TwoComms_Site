<style>
.checker-shell{display:flex;flex-direction:column;gap:18px;}
.checker-hero{display:flex;gap:20px;justify-content:space-between;flex-wrap:wrap;background:var(--panel-strong);border:1px solid var(--border);border-radius:var(--radius-lg);padding:22px 24px;box-shadow:var(--shadow-lg);}
.checker-hero__title{margin:6px 0 8px;font-size:1.5rem;color:var(--text-primary);}
.checker-hero__lead{color:var(--text-secondary);max-width:560px;margin:0 0 14px;font-size:.92rem;}
.checker-controls{display:flex;align-items:center;gap:10px;flex-wrap:wrap;}
.checker-hero__metrics{display:grid;grid-template-columns:repeat(2,minmax(120px,1fr));gap:10px;align-content:start;}
.checker-metric{background:var(--bg-850);border:1px solid var(--border);border-radius:var(--radius-md,12px);padding:10px 12px;display:flex;flex-direction:column;gap:2px;min-width:120px;}
.checker-metric__label{font-size:.72rem;color:var(--muted);text-transform:uppercase;letter-spacing:.04em;}
.checker-metric__value{font-size:1.3rem;font-weight:600;color:var(--text-primary);}
.checker-metric--fit .checker-metric__value{color:#4ade80;}
.checker-metric--maybe .checker-metric__value{color:var(--accent);}
.checker-metric--unfit .checker-metric__value{color:#f87171;}
.checker-metric--error .checker-metric__value{color:#fb7185;}
.checker-progress{display:flex;align-items:center;gap:12px;}
.checker-progress .progress-track{flex:1;height:8px;background:var(--bg-850);border-radius:99px;overflow:hidden;}
.checker-progress .progress-fill{height:100%;background:linear-gradient(90deg,var(--accent),var(--accent-strong));width:0;transition:width .4s ease;}
.checker-progress__label{font-size:.8rem;color:var(--text-secondary);min-width:90px;text-align:right;}
.checker-form .field-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(180px,1fr));gap:12px;}
.checker-form .field{display:flex;flex-direction:column;gap:6px;}
.checker-form label{font-size:.78rem;color:var(--text-secondary);}
.checker-form input,.checker-form select{background:var(--bg-850);border:1px solid var(--border);border-radius:10px;padding:9px 11px;color:var(--text-primary);font-size:.9rem;}
.field-span-2{grid-column:span 2;}
.checker-inline-status{font-size:.8rem;color:#4ade80;margin-left:10px;}
.checker-results__head{display:flex;justify-content:space-between;align-items:flex-end;gap:12px;flex-wrap:wrap;}
.checker-results__tools{display:flex;gap:8px;flex-wrap:wrap;}
.checker-mini-select{background:var(--bg-850);border:1px solid var(--border);border-radius:8px;color:var(--text-primary);padding:6px 9px;font-size:.82rem;}
.chk-hint{margin:10px 0 6px;}
.chk-hint b{color:var(--text-primary);}

/* Фільтр статусу модерації */
.chk-statusbar{display:flex;gap:8px;flex-wrap:wrap;margin:8px 0 4px;}
.chk-statuspill{display:inline-flex;align-items:center;gap:7px;background:var(--bg-850);border:1px solid var(--border);border-radius:99px;color:var(--text-secondary);padding:7px 14px;font-size:.84rem;cursor:pointer;transition:all .18s;}
.chk-statuspill:hover{color:var(--text-primary);border-color:rgba(243,164,61,.35);}
.chk-statuspill.is-active{background:var(--accent);border-color:var(--accent);color:#1a1205;font-weight:600;}
.chk-statuspill__c{display:inline-flex;align-items:center;justify-content:center;min-width:20px;height:18px;padding:0 5px;border-radius:99px;background:rgba(255,255,255,.1);font-size:.72rem;font-weight:700;}
.chk-statuspill.is-active .chk-statuspill__c{background:rgba(0,0,0,.18);}

/* Смуга вердикту AI */
.checker-tabs{display:flex;gap:6px;margin:10px 0;flex-wrap:wrap;}
.checker-tab{background:var(--bg-850);border:1px solid var(--border);border-radius:99px;color:var(--text-secondary);padding:7px 16px;font-size:.84rem;cursor:pointer;transition:all .2s;}
.checker-tab:hover{color:var(--text-primary);}
.checker-tab.is-active{background:var(--bg-900,#0b0e14);border-color:var(--accent);color:var(--accent);font-weight:600;}
.chk-meta{margin:0 0 10px;}

/* Список карток */
.chk-list{display:grid;gap:12px;}
.chk-card{border:1px solid var(--border);border-radius:16px;background:linear-gradient(150deg,rgba(255,255,255,.03),rgba(255,255,255,.012));overflow:hidden;transition:border-color .2s,box-shadow .2s;}
.chk-card:hover{border-color:rgba(243,164,61,.32);box-shadow:0 10px 26px rgba(0,0,0,.2);}
.chk-card.status-base{border-color:rgba(52,211,153,.4);}
.chk-card.status-rej{border-color:rgba(248,113,113,.34);opacity:.92;}
.chk-card__main{display:grid;grid-template-columns:auto 1fr auto;align-items:center;gap:14px;padding:13px 16px;cursor:pointer;}
.chk-card__info{min-width:0;}
.chk-card__name{font-weight:700;color:var(--text-primary);font-size:1rem;display:flex;align-items:center;gap:8px;flex-wrap:wrap;}
.chk-card__sub{display:flex;gap:10px;align-items:center;flex-wrap:wrap;margin-top:3px;}
.chk-card .muted{font-size:.78rem;color:var(--muted);}
.chk-cat{font-size:.78rem;color:var(--text-secondary);background:var(--bg-850);border:1px solid var(--border);border-radius:99px;padding:2px 9px;}
.chk-card__brand{margin-top:6px;font-size:.82rem;color:var(--text-secondary);line-height:1.4;display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical;overflow:hidden;}
.chk-rejnote{margin-top:6px;font-size:.8rem;color:#fca5a5;display:flex;align-items:center;gap:6px;}
.chk-rejnote svg{width:13px;height:13px;flex:none;}

/* Круглий читабельний бал */
.chk-score{display:inline-flex;align-items:center;justify-content:center;width:46px;height:46px;border-radius:50%;flex:none;background:var(--bg-900,#0b0e14);font-weight:800;font-size:1rem;border:2.5px solid var(--border);font-variant-numeric:tabular-nums;}
.chk-score[data-band="fit"]{border-color:#34d399;color:#6ee7b7;}
.chk-score[data-band="maybe"]{border-color:#f3a43d;color:var(--accent);}
.chk-score[data-band="unfit"]{border-color:#f87171;color:#fca5a5;}
.chk-score[data-band="error"]{border-color:#94a3b8;color:#cbd5e1;}

/* Теги статусу / мережі */
.chk-tag{font-size:.7rem;font-weight:700;padding:3px 9px;border-radius:99px;border:1px solid var(--border);white-space:nowrap;}
.chk-tag--mod{background:rgba(243,164,61,.14);color:var(--accent);border-color:rgba(243,164,61,.32);}
.chk-tag--base{background:rgba(52,211,153,.16);color:#6ee7b7;border-color:rgba(52,211,153,.34);}
.chk-tag--rej{background:rgba(248,113,113,.14);color:#fca5a5;border-color:rgba(248,113,113,.3);}
.chk-tag--conv{background:rgba(111,149,255,.14);color:#aac4ff;border-color:rgba(111,149,255,.3);}
.chk-tag--net{background:rgba(111,149,255,.12);color:#aac4ff;border-color:rgba(111,149,255,.28);font-weight:600;}

/* Кластер дій ✓ / ✗ / деталі */
.chk-actions{display:flex;gap:8px;align-items:center;}
.chk-act{width:38px;height:38px;border-radius:11px;border:1px solid var(--border);background:var(--bg-850);color:var(--text-secondary);cursor:pointer;display:inline-flex;align-items:center;justify-content:center;transition:all .16s;}
.chk-act svg{width:18px;height:18px;}
.chk-act:hover{transform:translateY(-1px);}
.chk-act--ok:hover{background:rgba(52,211,153,.18);border-color:#34d399;color:#6ee7b7;}
.chk-act--no:hover{background:rgba(248,113,113,.16);border-color:#f87171;color:#fca5a5;}
.chk-act--info svg{transition:transform .2s;}
.chk-card.is-open .chk-act--info svg{transform:rotate(90deg);}

/* Тіло-розгортка */
.chk-card__body{display:none;padding:0 16px 16px;border-top:1px solid var(--border);}
.chk-card.is-open .chk-card__body{display:block;}
.chk-detail{padding-top:12px;}
.chk-links{display:flex;gap:14px;flex-wrap:wrap;margin:8px 0;}
.chk-forms{margin-top:10px;}
.chk-formrow{display:flex;gap:8px;align-items:center;flex-wrap:wrap;margin-top:8px;padding:10px;border:1px dashed var(--border);border-radius:10px;}
.chk-formrow input{flex:1 1 200px;min-width:160px;background:var(--bg-850);border:1px solid var(--border);border-radius:8px;padding:8px 10px;color:var(--text-primary);font-size:.86rem;}
.chk-msg{font-size:.78rem;color:#fca5a5;}
.chk-detail__foot{display:flex;gap:10px;flex-wrap:wrap;margin-top:12px;padding-top:12px;border-top:1px dashed var(--border);}
.btn-ghost.small,.btn-primary.small{padding:6px 12px;font-size:.82rem;}
.chk-danger{color:#fca5a5;border-color:rgba(248,113,113,.4)!important;}
.chk-danger:hover{background:rgba(248,113,113,.12);}

/* Переисп. деталі (критерії, секції, джерела) */
.checker-chip{display:inline-block;background:var(--bg-850);border:1px solid var(--border);border-radius:99px;padding:2px 9px;font-size:.72rem;color:var(--text-secondary);margin:2px 3px 0 0;}
.checker-link-btn{color:var(--accent);text-decoration:none;font-size:.82rem;}
.checker-pagination{display:flex;gap:6px;align-items:center;justify-content:center;margin-top:14px;flex-wrap:wrap;}
.checker-pagination button{background:var(--bg-850);border:1px solid var(--border);border-radius:8px;color:var(--text-secondary);padding:6px 12px;cursor:pointer;}
.checker-pagination button.is-active{background:var(--accent);color:#1a1205;border-color:var(--accent);}
.checker-criteria{display:flex;flex-direction:column;gap:8px;margin:8px 0;}
.checker-criterion{display:grid;grid-template-columns:1fr auto;gap:6px 12px;background:var(--bg-850);border:1px solid var(--border);border-radius:10px;padding:9px 12px;}
.checker-criterion__title{color:var(--text-primary);font-size:.86rem;font-weight:600;}
.checker-criterion__bar{grid-column:1/-1;height:6px;background:var(--bg-900);border-radius:99px;overflow:hidden;}
.checker-criterion__bar i{display:block;height:100%;background:linear-gradient(90deg,var(--accent),var(--accent-strong));}
.checker-criterion__comment{grid-column:1/-1;color:var(--text-secondary);font-size:.8rem;}
.checker-detail-section{margin:10px 0;}
.checker-detail-section h4{margin:0 0 6px;color:var(--text-primary);font-size:.9rem;}
.checker-detail-section p{color:var(--text-secondary);font-size:.86rem;margin:0;}
.checker-sources a{display:block;color:var(--accent);font-size:.8rem;margin:2px 0;text-decoration:none;}
.checker-confidence{font-size:.74rem;padding:2px 8px;border-radius:99px;border:1px solid var(--border);color:var(--text-secondary);}
.checker-switch{display:flex;align-items:center;gap:8px;font-size:.8rem;color:var(--text-secondary);cursor:pointer;}
.checker-switch input{width:16px;height:16px;}
.checker-keys__hint{font-size:.74rem;color:var(--muted);max-width:280px;text-align:right;}
.checker-keys__grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(220px,1fr));gap:10px;margin-top:12px;}
.key-card{background:var(--bg-850);border:1px solid var(--border);border-radius:12px;padding:12px 14px;display:flex;flex-direction:column;gap:6px;}
.key-card__top{display:flex;justify-content:space-between;align-items:center;}
.key-card__name{font-weight:600;color:var(--text-primary);font-size:.9rem;}
.key-card__role{font-size:.68rem;text-transform:uppercase;letter-spacing:.04em;color:var(--muted);}
.key-dot{width:10px;height:10px;border-radius:50%;display:inline-block;}
.key-dot--ok{background:#4ade80;}
.key-dot--cooldown{background:var(--accent);}
.key-dot--topup{background:#f87171;}
.key-dot--missing{background:#64748b;}
.key-card__status{font-size:.8rem;color:var(--text-secondary);}
.key-card__cd{font-size:.82rem;color:var(--accent);font-variant-numeric:tabular-nums;}
.key-card__meta{font-size:.72rem;color:var(--muted);}
.key-card--unavailable{opacity:.85;border-color:rgba(243,164,61,.35);}
/* --- Полиш та адаптив --- */
.checker-hero{position:relative;overflow:hidden;}
.checker-hero::before{content:"";position:absolute;inset:0;background:radial-gradient(120% 80% at 100% 0%,rgba(243,164,61,.10),transparent 60%);pointer-events:none;}
.checker-metric{transition:transform .15s ease,border-color .15s ease;}
.checker-metric:hover{transform:translateY(-2px);border-color:rgba(243,164,61,.35);}
.key-card{transition:transform .15s ease,border-color .15s ease;}
.key-card:hover{transform:translateY(-2px);}
.muted-detail{font-size:.74rem;color:var(--muted);margin-top:2px;}
@media(max-width:980px){
  .checker-hero{flex-direction:column;}
  .checker-hero__metrics{grid-template-columns:repeat(4,minmax(80px,1fr));width:100%;}
}
@media(max-width:720px){
  .checker-hero__metrics{grid-template-columns:repeat(2,1fr);}
  .field-span-2{grid-column:span 1;}
  .checker-results__head{flex-direction:column;align-items:stretch;}
  .checker-results__tools{flex-wrap:wrap;}
  .chk-card__main{grid-template-columns:auto 1fr;grid-template-areas:"score info" "actions actions";gap:10px;}
  .chk-score{grid-area:score;}
  .chk-card__info{grid-area:info;}
  .chk-actions{grid-area:actions;justify-content:flex-end;}
  .checker-criterion{grid-template-columns:1fr;}
}
@media(max-width:480px){
  .checker-hero__metrics{grid-template-columns:repeat(2,1fr);}
  .checker-controls{width:100%;}
  .checker-controls .btn-primary,.checker-controls .btn-ghost{flex:1 1 auto;}
}
</style>
