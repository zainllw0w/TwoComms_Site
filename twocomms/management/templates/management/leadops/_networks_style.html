<style>
.netops .net-stats { grid-template-columns: repeat(4, 1fr); margin-bottom: 16px; }
.net-toolbar { display: grid; grid-template-columns: 2fr 1fr 1.4fr; gap: 12px; align-items: end; margin-bottom: 12px; }
.net-toolbar .field { margin: 0; }
.net-toolbar input, .net-toolbar select { width: 100%; }
.net-meta { margin: 0 0 12px; }

.net-list { display: grid; gap: 12px; }

.net-card {
    border: 1px solid var(--border);
    border-radius: 16px;
    background: linear-gradient(150deg, rgba(255,255,255,.03), rgba(255,255,255,.012));
    overflow: hidden;
    transition: border-color .2s, box-shadow .2s;
}
.net-card:hover { border-color: rgba(243,164,61,.35); box-shadow: 0 10px 28px rgba(0,0,0,.22); }
.net-card.is-confirmed { border-color: rgba(52,211,153,.45); }

.net-card__head {
    display: grid;
    grid-template-columns: auto 1fr auto auto;
    align-items: center;
    gap: 12px;
    padding: 14px 16px;
    cursor: pointer;
}
.net-card__chev { width: 18px; height: 18px; color: var(--text-secondary); transition: transform .2s; flex: none; }
.net-card.is-open .net-card__chev { transform: rotate(90deg); }
.net-card__title { display: flex; flex-direction: column; gap: 3px; min-width: 0; }
.net-card__name { font-weight: 700; color: var(--text-primary); font-size: 1rem; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
.net-card__sub { display: flex; gap: 8px; align-items: center; flex-wrap: wrap; }

.net-badge {
    display: inline-flex; align-items: center; gap: 5px;
    font-size: .72rem; font-weight: 600; padding: 3px 9px; border-radius: 99px;
    background: rgba(255,255,255,.06); color: var(--text-secondary); border: 1px solid var(--border);
}
.net-badge svg { width: 13px; height: 13px; }
.net-badge--members { background: rgba(111,149,255,.14); color: #aac4ff; border-color: rgba(111,149,255,.3); }
.net-badge--ai { background: rgba(243,164,61,.14); color: var(--accent); border-color: rgba(243,164,61,.32); }
.net-badge--confirmed { background: rgba(52,211,153,.16); color: #6ee7b7; border-color: rgba(52,211,153,.34); }
.net-badge--saved { background: rgba(52,211,153,.1); color: #86efac; }

.net-policy-chip {
    font-size: .74rem; font-weight: 700; padding: 5px 12px; border-radius: 99px; white-space: nowrap;
    border: 1px solid var(--border); background: rgba(255,255,255,.05); color: var(--text-secondary);
}
.net-policy-chip[data-policy^="block_"] { background: rgba(248,113,113,.14); color: #fca5a5; border-color: rgba(248,113,113,.3); }
.net-policy-chip[data-policy="priority_target"] { background: rgba(52,211,153,.16); color: #6ee7b7; border-color: rgba(52,211,153,.34); }
.net-policy-chip[data-policy="recheck_each"] { background: rgba(111,149,255,.14); color: #aac4ff; border-color: rgba(111,149,255,.3); }
.net-policy-chip[data-policy="needs_review"] { background: rgba(243,164,61,.14); color: var(--accent); border-color: rgba(243,164,61,.32); }

.net-card__body { display: none; padding: 0 16px 16px; border-top: 1px solid var(--border); }
.net-card.is-open .net-card__body { display: block; }

.net-members { display: grid; gap: 6px; margin: 14px 0; }
.net-member {
    display: grid; grid-template-columns: auto 1fr auto; align-items: center; gap: 10px;
    padding: 8px 10px; border-radius: 10px; background: rgba(255,255,255,.025); border: 1px solid var(--border);
}
.net-member__name { font-weight: 600; color: var(--text-primary); white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
.net-member__meta { font-size: .76rem; color: var(--text-secondary); }

.net-score {
    display: inline-flex; align-items: center; justify-content: center;
    width: 36px; height: 36px; border-radius: 50%; flex: none;
    background: var(--bg-900, #0b0e14); font-weight: 800; font-size: .82rem; border: 2px solid var(--border);
}
.net-score[data-band="fit"] { border-color: #34d399; color: #6ee7b7; }
.net-score[data-band="maybe"] { border-color: #f3a43d; color: var(--accent); }
.net-score[data-band="question"] { border-color: #a78bfa; color: #c4b5fd; }
.net-score[data-band="unfit"] { border-color: #f87171; color: #fca5a5; }
.net-score[data-band=""] { border-color: var(--border); color: var(--text-secondary); }

.net-controls { display: grid; grid-template-columns: 1fr auto; gap: 10px; align-items: end; padding-top: 12px; border-top: 1px dashed var(--border); }
.net-controls .field { margin: 0; }
.net-controls__row { display: flex; gap: 10px; flex-wrap: wrap; align-items: end; }
.net-extra { margin-top: 10px; }
.net-extra textarea { width: 100%; min-height: 56px; resize: vertical; }
.net-actions { display: flex; gap: 8px; }
.net-rationale { font-size: .8rem; color: var(--text-secondary); margin-top: 8px; line-height: 1.4; font-style: italic; }

.net-pagination { display: flex; gap: 6px; justify-content: center; flex-wrap: wrap; margin-top: 16px; }
.net-pagination button { min-width: 36px; }
.net-empty { text-align: center; color: var(--text-secondary); padding: 30px; }

@media (max-width: 720px) {
    .netops .net-stats { grid-template-columns: repeat(2, 1fr); }
    .net-toolbar { grid-template-columns: 1fr; }
    .net-card__head { grid-template-columns: auto 1fr auto; }
    .net-card__head .net-policy-chip { display: none; }
    .net-controls { grid-template-columns: 1fr; }
}
</style>
