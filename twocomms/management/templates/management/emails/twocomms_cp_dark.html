{# Body-only HTML — темна тема, яку Gmail НЕ інвертує: #}
{# фон через bgcolor-атрибут на таблицях, палітра середньо-темних сірих, #}
{# без <head>/<style>/<meta>. Однаколонкова stacked-вёрстка для надійності. #}
{# Preheader (прихований) #}
<div style="display:none;max-height:0;overflow:hidden;opacity:0;color:transparent;line-height:1px;font-size:1px;mso-hide:all;">
  {{ preheader }}
</div>

<table role="presentation" width="100%" cellpadding="0" cellspacing="0" border="0" bgcolor="#121212" style="background:#121212;">
  <tr>
    <td align="center" style="padding:24px 12px;">
      <table role="presentation" width="100%" cellpadding="0" cellspacing="0" border="0" style="width:100%;max-width:600px;">
        <tr>
          <td style="padding:0;">
            <table role="presentation" width="100%" cellpadding="0" cellspacing="0" border="0" bgcolor="#1E1E1E" style="border:1px solid #2A2A2A;border-radius:16px;overflow:hidden;background:#1E1E1E;">

              {# ===== Шапка ===== #}
              <tr>
                <td style="padding:22px 22px 14px;">
                  <table role="presentation" width="100%" cellpadding="0" cellspacing="0" border="0">
                    <tr>
                      <td align="left" valign="middle">
                        <table role="presentation" cellpadding="0" cellspacing="0" border="0">
                          <tr>
                            <td valign="middle" style="padding-right:12px;">
                              <img src="{{ logo_url }}" width="44" height="44" alt="TwoComms" style="display:block;border:0;outline:none;border-radius:12px;">
                            </td>
                            <td valign="middle" style="font-family:Arial,Helvetica,sans-serif;color:#E0E0E0;">
                              <div style="font-size:12px;letter-spacing:0.18em;text-transform:uppercase;font-weight:700;color:#BDBDBD;">TwoComms</div>
                              <div style="font-size:18px;font-weight:800;letter-spacing:0.02em;color:#E0E0E0;">Street &amp; Military</div>
                            </td>
                          </tr>
                        </table>
                      </td>
                      <td align="right" valign="middle" style="font-family:Arial,Helvetica,sans-serif;color:#BDBDBD;font-size:11px;text-transform:uppercase;letter-spacing:0.08em;">
                        Оптовий напрямок
                      </td>
                    </tr>
                  </table>
                </td>
              </tr>

              {# ===== Hero ===== #}
              <tr>
                <td style="padding:6px 22px 16px;">
                  <div style="font-family:Arial,Helvetica,sans-serif;font-size:23px;line-height:1.25;font-weight:900;color:#E0E0E0;">
                    {% if shop_name %}{{ shop_name }}, {% endif %}тест-ростовка S–XL на 14 днів — перевірте попит без ризику
                  </div>
                  <div style="margin-top:12px;font-family:Arial,Helvetica,sans-serif;font-size:14px;line-height:1.55;color:#BDBDBD;">
                    Не зайшло — повертаєте залишки. Сплачуєте лише доставку. Опт від 8 шт або дропшип без складу.
                  </div>
                </td>
              </tr>

              {# ===== CTA (stacked, на всю ширину) ===== #}
              <tr>
                <td style="padding:0 22px 16px;">
                  {% if cta_url %}
                  <table role="presentation" width="100%" cellpadding="0" cellspacing="0" border="0">
                    <tr>
                      <td bgcolor="#ff7e29" align="center" style="border-radius:12px;background:#ff7e29;">
                        <a href="{{ cta_url }}" target="_blank" rel="noopener"
                           style="display:block;padding:14px 18px;font-family:Arial,Helvetica,sans-serif;font-size:15px;font-weight:800;color:#1A1A1A;text-decoration:none;border-radius:12px;">
                          {{ cta_button_text }}
                        </a>
                      </td>
                    </tr>
                  </table>
                  <div style="height:10px;line-height:10px;">&nbsp;</div>
                  {% endif %}
                  {% if cta_secondary_url %}
                  <table role="presentation" width="100%" cellpadding="0" cellspacing="0" border="0">
                    <tr>
                      <td bgcolor="#121212" align="center" style="border-radius:12px;border:1px solid #3A3A3A;background:#121212;">
                        <a href="{{ cta_secondary_url }}" target="_blank" rel="noopener"
                           style="display:block;padding:13px 18px;font-family:Arial,Helvetica,sans-serif;font-size:14px;font-weight:800;color:#ff8f3c;text-decoration:none;border-radius:12px;">
                          {{ cta_secondary_text }}
                        </a>
                      </td>
                    </tr>
                  </table>
                  {% endif %}
                  <div style="margin-top:10px;font-family:Arial,Helvetica,sans-serif;font-size:12px;line-height:1.45;color:#8A8A8A;">
                    {{ cta_microtext }}
                  </div>
                </td>
              </tr>

              {# ===== Trust strip ===== #}
              <tr>
                <td style="padding:0 22px 16px;">
                  <table role="presentation" width="100%" cellpadding="0" cellspacing="0" border="0" bgcolor="#121212" style="border:1px solid #2A2A2A;border-radius:14px;background:#121212;">
                    <tr>
                      <td style="padding:12px 14px;font-family:Arial,Helvetica,sans-serif;font-size:12px;line-height:1.8;color:#BDBDBD;">
                        {% for point in trust_points %}<span style="color:#ff8f3c;font-weight:800;">•</span> {{ point }}{% if not forloop.last %} &nbsp; {% endif %}{% endfor %}
                      </td>
                    </tr>
                  </table>
                </td>
              </tr>

              {# ===== Опт-таблиця ===== #}
              <tr>
                <td style="padding:0 22px 16px;">
                  <div style="font-family:Arial,Helvetica,sans-serif;color:#BDBDBD;font-size:12px;letter-spacing:0.14em;text-transform:uppercase;font-weight:800;">Оптові ціни за обсягом</div>
                  <div style="height:10px;line-height:10px;">&nbsp;</div>
                  <table role="presentation" width="100%" cellpadding="0" cellspacing="0" border="0" bgcolor="#121212" style="border:1px solid #2A2A2A;border-radius:14px;overflow:hidden;background:#121212;">
                    <tr bgcolor="#1E1E1E">
                      <td style="padding:9px 12px;font-family:Arial,Helvetica,sans-serif;font-size:12px;font-weight:800;color:#BDBDBD;background:#1E1E1E;">Обсяг</td>
                      <td align="right" style="padding:9px 12px;font-family:Arial,Helvetica,sans-serif;font-size:12px;font-weight:800;color:#BDBDBD;background:#1E1E1E;">Футболка</td>
                      <td align="right" style="padding:9px 12px;font-family:Arial,Helvetica,sans-serif;font-size:12px;font-weight:800;color:#BDBDBD;background:#1E1E1E;">Худі</td>
                    </tr>
                    {% for row in opt_grid %}
                    <tr bgcolor="#121212">
                      <td style="padding:9px 12px;font-family:Arial,Helvetica,sans-serif;font-size:13px;color:#E0E0E0;font-weight:700;border-top:1px solid #2A2A2A;background:#121212;">{{ row.range }}</td>
                      <td align="right" style="padding:9px 12px;font-family:Arial,Helvetica,sans-serif;font-size:13px;color:#E0E0E0;border-top:1px solid #2A2A2A;background:#121212;">{{ row.tee_display }} грн</td>
                      <td align="right" style="padding:9px 12px;font-family:Arial,Helvetica,sans-serif;font-size:13px;color:#E0E0E0;border-top:1px solid #2A2A2A;background:#121212;">{{ row.hoodie_display }} грн</td>
                    </tr>
                    {% endfor %}
                  </table>
                  <div style="margin-top:8px;font-family:Arial,Helvetica,sans-serif;font-size:12px;line-height:1.45;color:#8A8A8A;">Чим більший обсяг — тим нижча ціна за одиницю. Кратно 8 шт.</div>
                </td>
              </tr>

              {# ===== Юніт-економіка (дві картки stacked) ===== #}
              <tr>
                <td style="padding:0 22px 16px;">
                  <div style="font-family:Arial,Helvetica,sans-serif;color:#BDBDBD;font-size:12px;letter-spacing:0.14em;text-transform:uppercase;font-weight:800;">Приклад юніт-економіки</div>
                  <div style="height:10px;line-height:10px;">&nbsp;</div>

                  <table role="presentation" width="100%" cellpadding="0" cellspacing="0" border="0" bgcolor="#121212" style="border:1px solid #2A2A2A;border-radius:14px;background:#121212;">
                    <tr><td style="padding:14px 16px;font-family:Arial,Helvetica,sans-serif;">
                      <div style="font-size:14px;font-weight:900;color:#E0E0E0;">Футболка</div>
                      <div style="margin-top:8px;font-size:13px;line-height:1.7;color:#BDBDBD;">
                        Вхід: <span style="color:#E0E0E0;font-weight:800;">{{ tee_entry_display }} грн</span> &nbsp;•&nbsp;
                        Роздріб (приклад): <span style="color:#E0E0E0;font-weight:800;">{{ tee_retail_example_display }} грн</span> &nbsp;•&nbsp;
                        Прибуток*: <span style="color:#ff8f3c;font-weight:900;">{{ tee_profit_display }} грн</span>
                      </div>
                    </td></tr>
                  </table>
                  <div style="height:10px;line-height:10px;">&nbsp;</div>
                  <table role="presentation" width="100%" cellpadding="0" cellspacing="0" border="0" bgcolor="#121212" style="border:1px solid #2A2A2A;border-radius:14px;background:#121212;">
                    <tr><td style="padding:14px 16px;font-family:Arial,Helvetica,sans-serif;">
                      <div style="font-size:14px;font-weight:900;color:#E0E0E0;">Худі</div>
                      <div style="margin-top:8px;font-size:13px;line-height:1.7;color:#BDBDBD;">
                        Вхід: <span style="color:#E0E0E0;font-weight:800;">{{ hoodie_entry_display }} грн</span> &nbsp;•&nbsp;
                        Роздріб (приклад): <span style="color:#E0E0E0;font-weight:800;">{{ hoodie_retail_example_display }} грн</span> &nbsp;•&nbsp;
                        Прибуток*: <span style="color:#ff8f3c;font-weight:900;">{{ hoodie_profit_display }} грн</span>
                      </div>
                    </td></tr>
                  </table>
                  <div style="margin-top:8px;font-family:Arial,Helvetica,sans-serif;font-size:12px;line-height:1.45;color:#8A8A8A;">*Це приклад розрахунку. Роздрібну ціну встановлюєте ви.</div>
                </td>
              </tr>

              {# ===== Чому з нами ===== #}
              <tr>
                <td style="padding:0 22px 16px;">
                  <div style="font-family:Arial,Helvetica,sans-serif;color:#BDBDBD;font-size:12px;letter-spacing:0.14em;text-transform:uppercase;font-weight:800;">Чому з нами вигідно</div>
                  <div style="height:8px;line-height:8px;">&nbsp;</div>
                  {% for item in why_us %}
                  <div style="font-family:Arial,Helvetica,sans-serif;font-size:13px;line-height:1.55;color:#E0E0E0;margin-top:7px;">
                    <span style="color:#ff8f3c;font-weight:900;">→</span> {{ item }}
                  </div>
                  {% endfor %}
                </td>
              </tr>

              {# ===== Картки товарів ===== #}
              {% if gallery %}
              <tr>
                <td style="padding:0 22px 16px;">
                  <div style="font-family:Arial,Helvetica,sans-serif;color:#BDBDBD;font-size:12px;letter-spacing:0.14em;text-transform:uppercase;font-weight:800;">Популярні моделі</div>
                  <div style="height:10px;line-height:10px;">&nbsp;</div>
                  {% for item in gallery %}
                  <table role="presentation" width="100%" cellpadding="0" cellspacing="0" border="0" bgcolor="#121212" style="border:1px solid #2A2A2A;border-radius:14px;overflow:hidden;background:#121212;">
                    <tr>
                      <td bgcolor="#161616" style="background:#161616;">
                        <a href="{{ item.link_url }}" target="_blank" rel="noopener" style="text-decoration:none;">
                          <img src="{{ item.img_url }}" width="552" alt="{{ item.title }}" style="display:block;width:100%;height:auto;border:0;outline:none;">
                        </a>
                      </td>
                    </tr>
                    <tr>
                      <td style="padding:10px 14px 12px;font-family:Arial,Helvetica,sans-serif;">
                        <div style="font-size:13px;line-height:1.35;color:#E0E0E0;font-weight:700;">{{ item.title }}</div>
                      </td>
                    </tr>
                  </table>
                  {% if not forloop.last %}<div style="height:10px;line-height:10px;">&nbsp;</div>{% endif %}
                  {% endfor %}
                </td>
              </tr>
              {% endif %}

              {# ===== Контакти менеджера ===== #}
              {% if show_manager %}
              <tr>
                <td style="padding:4px 22px 16px;">
                  <table role="presentation" width="100%" cellpadding="0" cellspacing="0" border="0" style="border-top:1px solid #2A2A2A;">
                    <tr>
                      <td style="padding-top:16px;font-family:Arial,Helvetica,sans-serif;">
                        <div style="font-size:12px;letter-spacing:0.14em;text-transform:uppercase;font-weight:800;color:#BDBDBD;">Ваш менеджер</div>
                        <div style="height:10px;line-height:10px;">&nbsp;</div>
                        <table role="presentation" width="100%" cellpadding="0" cellspacing="0" border="0">
                          <tr>
                            <td valign="top" style="font-family:Arial,Helvetica,sans-serif;color:#E0E0E0;">
                              <div style="font-weight:900;font-size:14px;">{{ manager_name|default:"TwoComms" }}</div>
                              {% if manager_phone %}<div style="margin-top:6px;font-size:13px;color:#BDBDBD;">Телефон: {{ manager_phone }}</div>{% endif %}
                              {% if manager_tg %}<div style="margin-top:6px;font-size:13px;color:#BDBDBD;">Telegram: {{ manager_tg }}</div>{% endif %}
                              {% if manager_viber %}<div style="margin-top:6px;font-size:13px;color:#BDBDBD;">Viber: {{ manager_viber }}</div>{% endif %}
                              {% if manager_whatsapp %}<div style="margin-top:6px;font-size:13px;color:#BDBDBD;">WhatsApp: {{ manager_whatsapp }}</div>{% endif %}
                            </td>
                            {% if manager_photo_url %}
                            <td align="right" valign="top" style="padding-left:12px;">
                              <img src="{{ manager_photo_url }}" width="56" height="56" alt="{{ manager_name }}" style="display:block;border:0;outline:none;border-radius:999px;">
                            </td>
                            {% endif %}
                          </tr>
                        </table>
                      </td>
                    </tr>
                  </table>
                </td>
              </tr>
              {% endif %}

              {# ===== Футер ===== #}
              <tr>
                <td style="padding:14px 22px 18px;border-top:1px solid #2A2A2A;font-family:Arial,Helvetica,sans-serif;color:#8A8A8A;font-size:12px;line-height:1.5;">
                  <div style="color:#BDBDBD;font-weight:800;">TwoComms — одяг для свідомих.</div>
                  <div style="margin-top:8px;">
                    {% if include_instagram_link %}<a href="{{ links.instagram }}" target="_blank" rel="noopener" style="color:#ff8f3c;text-decoration:underline;">Instagram</a>{% endif %}
                    {% if include_instagram_link and include_site_link %}&nbsp;·&nbsp;{% endif %}
                    {% if include_site_link %}<a href="{{ links.site }}" target="_blank" rel="noopener" style="color:#ff8f3c;text-decoration:underline;">Сайт</a>{% endif %}
                  </div>
                </td>
              </tr>

            </table>
            {% if tracking_pixel_url %}<img src="{{ tracking_pixel_url }}" width="1" height="1" alt="" style="display:block;width:1px;height:1px;border:0;opacity:0;overflow:hidden;">{% endif %}
          </td>
        </tr>
      </table>
    </td>
  </tr>
</table>
